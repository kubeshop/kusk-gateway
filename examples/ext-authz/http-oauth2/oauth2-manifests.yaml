---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-auth-http-oauth2-httpbin
  namespace: default
  labels:
    app: ext-auth-http-oauth2-httpbin
spec:
  selector:
    matchLabels:
      app: httpbin
  replicas: 1
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - image: docker.io/kennethreitz/httpbin
          name: httpbin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ext-auth-http-oauth2-httpbin
  namespace: default
  labels:
    app: ext-auth-http-oauth2-httpbin
spec:
  selector:
    app: ext-auth-http-oauth2-httpbin
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
